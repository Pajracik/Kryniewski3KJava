<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 48 - Rohde</title>
</head>
<body>

    <script>
        let suma_roh = 0;

        for (let i_roh = 1; i_roh <= 1000000; i_roh++) {
            suma_roh = suma_roh + 1 / i_roh;
        }

        document.write("<h3>Suma szeregu harmonicznego:</h3>");
        document.write("Suma od wyrazu 1 do 1000000 wynosi: " + suma_roh);
    </script>

</body>
</html>
