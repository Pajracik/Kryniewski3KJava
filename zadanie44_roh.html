<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 44 - Rohde</title>
</head>
<body>

    <script>
        document.write("<p>ilość wykonania pętli = 11</p>");
        document.write("<p>wielkość liter = 42px</p><hr>");

        for (let i_r = 1; i_r <= 11; i_r++) {
            if (i_r % 2 !== 0) {
                document.write("<span style='font-size: 42px;'>Rohde</span><br>");
            } else {
                document.write("<span style='font-size: 42px;'>Tomasz</span><br>");
            }
        }
    </script>

</body>
</html>
