<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 53 - Rohde</title>
</head>
<body>

    <div style="font-family: monospace; white-space: pre; line-height: 12px;">
        <script>
            let a_roh = parseInt(prompt("Podaj wysokość a:", ""));
            let b_roh = parseInt(prompt("Podaj szerokość b:", ""));

            for (let i = 1; i <= b_roh; i++) {
                document.write("*");
            }
            document.write("<br>");

            let wiersz_roh = "*";
            for (let i = 1; i <= (b_roh - 2); i++) {
                wiersz_roh = wiersz_roh + "&nbsp;&nbsp;";
            }
            wiersz_roh = wiersz_roh + "*";

            for (let i = 1; i <= (a_roh - 2); i++) {
                document.write(wiersz_roh + "<br>");
            }

            for (let i = 1; i <= b_roh; i++) {
                document.write("*");
            }
            document.write("<br>");
        </script>
    </div>

</body>
</html>
