<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Przykład użycia pętli</title>
</head>
<body>

    <div style="margin-left: 2cm; color: red;">Rohde</div>
    <div style="margin-left: 5mm; color: blue;">Wyprowadzanie liczb od 1 do 10 przesuniętych o jedną spację w prawo. Demonstracja pętli zagnieżdżonych (czyli pętla w pętli).</div>
    <br>

    <script>
        for (var i = 1; i <= 10; i++) {
            for (var k = 1; k <= i; k++) {
                document.write("&nbsp;");
            }
            document.write(i + "<br>");
        }
    </script>

</body>
</html>
