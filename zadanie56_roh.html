<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 56 - Rohde</title>
</head>
<body>

    <script>
        let licznik_roh = 0;

        for (let i_roh = 0; i_roh <= 39; i_roh++) {
            let w_roh = (i_roh * i_roh) + i_roh + 41;
            
            document.write("i=" + i_roh + "&nbsp;&nbsp;&nbsp;&nbsp;w(" + i_roh + ")=" + w_roh + "<br>");
            licznik_roh++;

            if (licznik_roh % 5 === 0) {
                alert("Zatrzymanie ekranu (kliknij OK, aby kontynuować)");
            }
        }
    </script>

</body>
</html>
