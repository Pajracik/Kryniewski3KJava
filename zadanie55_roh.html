<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 55 - Rohde</title>
</head>
<body>

    <script>
        let l1_t_roh, l2_t_roh;

        do {
            l1_t_roh = parseInt(prompt("Podaj pierwszą liczbę (20-60):", ""));
            if (l1_t_roh < 20 || l1_t_roh > 60 || isNaN(l1_t_roh)) {
                alert("liczba l1 nie należy do przedziału <20,60>");
            }
        } while (l1_t_roh < 20 || l1_t_roh > 60 || isNaN(l1_t_roh));

        do {
            l2_t_roh = parseInt(prompt("Podaj drugą liczbę (20-60):", ""));
            if (l2_t_roh < 20 || l2_t_roh > 60 || isNaN(l2_t_roh)) {
                alert("liczba l2 nie należy do przedziału <20,60>");
            }
        } while (l2_t_roh < 20 || l2_t_roh > 60 || isNaN(l2_t_roh));

        let pocz_roh = parseInt(prompt("Podaj wartość początkową wielkości tekstu:", ""));
        let tekst_roh = prompt("Podaj dowolny tekst:", "");

        if (l1_t_roh < l2_t_roh) {
            for (let i = pocz_roh; ; i += 5) {
                if (i > 100) break;
                document.write("<p style=\"font-size:" + i + "px; color: black;\"><br>" + tekst_roh + "<br></p>");
            }
        } else if (l2_t_roh < l1_t_roh) {
            for (let i = pocz_roh; ; i -= 5) {
                if (i < 0) break;
                document.write("<p style=\"font-size:" + i + "px; color: black;\"><br>" + tekst_roh + "<br></p>");
            }
        } else if (l2_t_roh === l1_t_roh) {
            document.write("<p style=\"font-size:" + pocz_roh + "px; color: black;\"><br>" + tekst_roh + "<br></p>");
        }
    </script>

</body>
</html>
